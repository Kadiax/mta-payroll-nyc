version: 2

sources:
  - name: bronze_mta_payroll
    schema: bronze
    tables:
      - name: raw_mta_payroll
        description: "Raw payroll data ingested from GCS into BigQuery (Bronze Layer)"
        columns:
          - name: Year
            description: "{{ doc('col_fiscal_year') }}"
          - name: name_hash
            description: "{{ doc('col_name_hash') }}"
            tests:
              - not_null # Security: hashing is mandatory
          - name: Working_Agency
            description: "{{ doc('col_agency_name') }}"
          - name: Start_Date
            description: "{{ doc('col_start_date') }}"
          - name: Separation_Date
            description: "{{ doc('col_separation_date') }}"
          - name: Title
            description: "{{ doc('col_job_title') }}"
          - name: Department
            description: "{{ doc('col_department_name') }}"
          - name: Pay_Basis
            description: "{{ doc('col_pay_basis') }}"
          - name: Hourly_Rate
            description: "{{ doc('col_hourly_rate') }}"
          - name: Regular_Pay
            description: "{{ doc('col_regular_pay') }}"
          - name: Overtime_Pay
            description: "{{ doc('col_overtime_pay') }}"
          - name: Cash_Outs
            description: "{{ doc('col_cash_outs') }}"
          - name: Retro_Pay
            description: "{{ doc('col_retro_pay') }}"
          - name: Other_Pay
            description: "{{ doc('col_other_pay') }}"
          - name: Total_Earnings
            description: "{{ doc('col_total_earnings') }}"
          - name: Updated_At
            description: "{{ doc('col_updated_at') }}"
          - name: raw_ingested_at
            description: "{{ doc('col_raw_ingested_at') }}"
          - name: source_file
            description: "{{ doc('col_source_file') }}"
            tests:
              - not_null
